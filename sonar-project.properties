# Display name of the project in the UI
sonar.projectName=ProyectoDiseñoPatrones_v2
# Version of the project being analyzed
sonar.projectVersion=1.0.0

# =====================================================================
# 2. Server Configuration (Can also be passed via CI/CD environment)
# =====================================================================
sonar.host.url=http://localhost:9000
sonar.token=squ_9ac8bdf06bb66739cbd435ffa2720211492c6aeb
# =====================================================================
# 3. Source Code Paths & Files
# =====================================================================
# Comma-separated paths to source directories (relative to this file)
sonar.sources=src/main/java
# Comma-separated paths to test directories
sonar.tests=src/test/java

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# =====================================================================
# 4. Java Specific Requirements (Mandatory)
