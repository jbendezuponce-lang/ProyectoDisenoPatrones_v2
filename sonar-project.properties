# Path to JUnit execution reports
sonar.junit.reportPaths=target/surefire-reports,target/failsafe-reports

# =====================================================================
# 6. Exclusions and Inclusions (Optional)
# =====================================================================
# Files or directories to completely ignore during analysis
sonar.exclusions=**/generated/**/*,**/*Dto.java