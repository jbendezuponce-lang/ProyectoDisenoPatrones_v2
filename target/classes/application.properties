################### SERVER ##########################
spring.application.name=laboratorio-poo
server.port=8090
# Esto hará que todas tus rutas empiecen con /api (ej: http://localhost:8090/api/productos)
server.servlet.context-path=/api

################### CONEXION BD (H2) ##########################
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
# Acceso a consola: http://localhost:8090/api/h2-console

################### JPA ##########################
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
# Usa 'update' para no borrar tus datos cada vez que reinicies el servidor
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Para cargar tu archivo data.sql inicial automáticamente
spring.jpa.defer-datasource-initialization=true
# Mantiene la sesión de Hibernate abierta durante la serialización JSON de la
# respuesta (evita LazyInitializationException al devolver relaciones @OneToMany).
# Se deja explícito para no depender del valor por defecto y evitar el warning de arranque.
spring.jpa.open-in-view=true

################### H2 CONSOLE ##########################
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

################### SWAGGER / OPENAPI ##########################
# Esta ruta funcionará en: http://localhost:8090/api/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html